<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>خط بوستان زر ↔ اصفهان</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #0f5132;
    --green-main: #1f8a4c;
    --green-soft: #eaf5ee;
    --turquoise: #3fa9a0;
    --amber: #e8a33d;
    --panel: rgba(255,255,255,0.88);
    --panel-dim: rgba(255,255,255,0.55);
    --text-dark: #17332a;
    --text-dim: #5c6b64;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    font-family: 'Vazirmatn', 'Tahoma', sans-serif;
  }

  body {
    min-height: 100vh;
    background-image: url('bg.png');
    background-size: cover;
    background-position: top center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .wrap {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 22px 16px 30px;
  }

  .top-title {
    text-align: center;
    color: var(--green-deep);
    text-shadow: 0 1px 0 rgba(255,255,255,0.6);
  }

  .top-title .line-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    opacity: 0.85;
  }

  .top-title h1 {
    margin: 4px 0 0;
    font-size: 22px;
    font-weight: 800;
  }

  .spacer { flex: 1 1 auto; min-height: 6vh; }

  .sheet {
    background: var(--panel);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 26px 26px 22px 22px;
    padding: 18px 16px 20px;
    box-shadow: 0 20px 50px rgba(15, 81, 50, 0.25);
    border: 1px solid rgba(255,255,255,0.6);
  }

  .next-card {
    background: linear-gradient(135deg, var(--green-main), var(--green-deep));
    border-radius: 18px;
    padding: 16px 18px;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    box-shadow: 0 8px 20px rgba(15,81,50,0.35);
  }

  .next-card.ended {
    background: linear-gradient(135deg, #7c8b83, #4c5851);
  }

  .next-info .label {
    font-size: 12px;
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--amber);
    display: inline-block;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(232,163,61,0.5); }
    50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(232,163,61,0); }
  }

  .next-info .time {
    font-size: 30px;
    font-weight: 800;
    margin-top: 2px;
    direction: ltr;
    display: inline-block;
  }

  .next-info .from {
    font-size: 12px;
    opacity: 0.9;
    margin-top: 2px;
  }

  .countdown {
    text-align: center;
    background: rgba(255,255,255,0.18);
    border-radius: 14px;
    padding: 8px 14px;
    min-width: 78px;
  }

  .countdown .num {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
  }

  .countdown .txt {
    font-size: 10px;
    opacity: 0.85;
    margin-top: 3px;
  }

  .tabs {
    display: flex;
    margin-top: 16px;
    background: rgba(15,81,50,0.08);
    border-radius: 14px;
    padding: 4px;
    gap: 4px;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 10px 0;
    border-radius: 11px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
    user-select: none;
  }

  .tab.active {
    background: var(--green-main);
    color: #fff;
    box-shadow: 0 4px 10px rgba(31,138,76,0.35);
  }

  .from-station {
    text-align: center;
    font-size: 12.5px;
    color: var(--text-dim);
    margin-top: 12px;
    line-height: 1.5;
  }

  .list {
    margin-top: 10px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .slot {
    background: #fff;
    border: 1px solid rgba(15,81,50,0.12);
    border-radius: 12px;
    padding: 10px 4px;
    text-align: center;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-dark);
    direction: ltr;
    position: relative;
  }

  .slot.passed {
    color: #a8b3ad;
    background: #f4f6f5;
    border-color: rgba(0,0,0,0.04);
  }

  .slot.next {
    color: var(--turquoise);
    border: 1.5px solid var(--turquoise);
    background: #eefaf8;
  }

  .slot.next::after {
    content: '';
    position: absolute;
    top: -4px;
    left: -4px;
    width: 8px;
    height: 8px;
    background: var(--amber);
    border-radius: 50%;
  }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 16px;
    opacity: 0.85;
  }

  .brand {
    text-align: center;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    font-size: 10px;
    letter-spacing: 2px;
    margin-top: 14px;
    text-transform: uppercase;
  }

  .signature {
    text-align: center;
    margin-top: 6px;
    font-family: 'Great Vibes', cursive;
    font-size: 26px;
    color: #ffffff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.35);
    direction: ltr;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="top-title">
    <div class="line-name">اتوبوسرانی واحد</div>
    <h1>خط بوستان زر ↔ اصفهان</h1>
  </div>

  <div class="spacer"></div>

  <div class="sheet">
    <div class="next-card" id="nextCard">
      <div class="next-info">
        <div class="label"><span class="dot"></span> اتوبوس بعدی</div>
        <div class="time" id="nextTime">--:--</div>
        <div class="from" id="nextFrom">در حال بارگذاری...</div>
      </div>
      <div class="countdown">
        <div class="num" id="countdownNum">--</div>
        <div class="txt">تا حرکت</div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-mode="depart" onclick="setMode('depart')">رفت</div>
      <div class="tab" data-mode="return" onclick="setMode('return')">بازگشت</div>
    </div>

    <div class="from-station" id="fromStation">
      رفت از ایستگاه امامزاده سید محمد(ع) بوستان زر
    </div>

    <div class="list" id="list"></div>

    <div class="footer-note">
      زمان‌ها تقریبی و بر اساس برنامه‌ی اعلامی خط هستند
    </div>
  </div>

  <div class="brand">اتوبوس واحد بوستان زر</div>
  <div class="signature">Morteza Rahmani</div>
</div>

<script>
const departTimes = ["06:15","08:00","09:35","11:00","12:45","14:20","16:05","17:45"];
const returnTimes = ["07:05","08:50","10:20","11:50","13:35","15:10","16:55","19:00"];

const fromDepart = "رفت از ایستگاه امامزاده سید محمد(ع) بوستان زر";
const fromReturn = "بازگشت از ایستگاه پایانه اندیشه اصفهان";

let currentMode = 'depart';

function toMinutes(t) {
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}

function formatNow() {
  const now = new Date();
  return now.getHours() * 60 + now.getMinutes();
}

function renderList() {
  const times = currentMode === 'depart' ? departTimes : returnTimes;
  const nowMin = formatNow();
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';

  let nextIndexForMode = times.findIndex(t => toMinutes(t) > nowMin);

  times.forEach((t, i) => {
    const div = document.createElement('div');
    div.className = 'slot';
    if (toMinutes(t) <= nowMin) div.classList.add('passed');
    if (i === nextIndexForMode) div.classList.add('next');
    div.textContent = t;
    listEl.appendChild(div);
  });

  document.getElementById('fromStation').textContent =
    currentMode === 'depart' ? fromDepart : fromReturn;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.mode === mode);
  });
  renderList();
}

function formatCountdown(diff) {
  if (diff < 60) return diff + ' دقیقه';
  const h = Math.floor(diff / 60);
  const m = diff % 60;
  return h + ':' + String(m).padStart(2, '0');
}

function updateNextGlobal() {
  const nowMin = formatNow();

  const all = [
    ...departTimes.map(t => ({ t, min: toMinutes(t), mode: 'depart' })),
    ...returnTimes.map(t => ({ t, min: toMinutes(t), mode: 'return' })),
  ].sort((a, b) => a.min - b.min);

  const upcoming = all.filter(x => x.min > nowMin);
  const card = document.getElementById('nextCard');
  const timeEl = document.getElementById('nextTime');
  const fromEl = document.getElementById('nextFrom');
  const countEl = document.getElementById('countdownNum');

  if (upcoming.length === 0) {
    card.classList.add('ended');
    timeEl.textContent = 'پایان سرویس';
    fromEl.textContent = 'فردا از ساعت ۰۶:۱۵ شروع می‌شود';
    countEl.textContent = '--';
  } else {
    card.classList.remove('ended');
    const next = upcoming[0];
    timeEl.textContent = next.t;
    fromEl.textContent = next.mode === 'depart' ? fromDepart : fromReturn;
    const diff = next.min - nowMin;
    countEl.textContent = formatCountdown(diff);
  }
}

function refresh() {
  updateNextGlobal();
  renderList();
}

refresh();
setInterval(refresh, 30000);
</script>

</body>
</html>
